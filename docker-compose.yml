services:
  postgres:
    image: postgres:16-alpine
    container_name: gondly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gondly
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - gondly-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gondly"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gondly-postgres-data:
